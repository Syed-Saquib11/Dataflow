<div class="page-header">
  <div>
    <h2 class="page-title">Dashboard</h2>
    <p class="page-subtitle" id="dash-subtitle">Loading overview…</p>
  </div>
</div>

<div class="page-body">

  <!-- KPI Stat Cards -->
  <div class="stats-row" id="dash-stats"></div>

  <!-- Middle row: Fee Status + Recent Students -->
  <div class="dash-mid-row">

    <!-- Fee Status Card -->
    <div class="card dash-fee-card">
      <div class="dash-section-label">Fee Status</div>
      <div id="dash-fee-chart"></div>
    </div>

    <!-- Recently Added Students -->
    <div class="table-card dash-recent-card">
      <div class="dash-section-label" style="padding:16px 20px 8px;">Recently Added Students</div>
      <div class="table-wrapper dash-recent-table-wrap">
        <table id="dash-recent-table">
          <thead>
            <tr>
              <th>Student ID</th>
              <th>Name</th>
              <th>Class</th>
              <th>Phone</th>
              <th>Fee</th>
            </tr>
          </thead>
          <tbody id="dash-recent-tbody">
            <tr>
              <td colspan="5">
                <div class="empty-state" style="padding:20px 0;">
                  <div class="empty-state-icon">⏳</div>
                  <h3>Loading…</h3>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- Bottom row: Quick Actions + Calendar -->
  <div class="dash-bottom-row">

    <!-- Quick Actions -->
    <div class="card dash-actions-card">
      <div class="dash-section-label">Quick Actions</div>
      <div class="dash-actions-grid">
        <button class="btn btn-primary" id="dash-add-student-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          Add Student
        </button>
        <button class="btn btn-ghost" id="dash-go-courses-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
          </svg>
          Manage Courses
        </button>
        <button class="btn btn-ghost" id="dash-go-fees-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="5" width="20" height="14" rx="2" />
            <line x1="2" y1="10" x2="22" y2="10" />
          </svg>
          View Fees
        </button>
        <button class="btn btn-ghost" id="dash-go-slots-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" />
            <line x1="16" y1="2" x2="16" y2="6" />
            <line x1="8" y1="2" x2="8" y2="6" />
            <line x1="3" y1="10" x2="21" y2="10" />
          </svg>
          Slot Management
        </button>
      </div>
    </div>

    <!-- Calendar -->
    <div class="card dash-calendar-card">
      <div class="dash-calendar-header">
        <button class="dash-cal-nav" id="dash-cal-prev">&#8249;</button>
        <div class="dash-cal-title" id="dash-cal-title"></div>
        <button class="dash-cal-nav" id="dash-cal-next">&#8250;</button>
      </div>
      <div class="dash-cal-weekdays">
        <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
      </div>
      <div class="dash-cal-grid" id="dash-cal-grid"></div>
      <div class="dash-cal-legend">
        <span class="dash-cal-legend-dot today"></span><span>Today</span>
        <span class="dash-cal-legend-dot holiday"></span><span>Holiday</span>
      </div>
      <div class="dash-cal-holiday-info" id="dash-cal-holiday-info"></div>
    </div>

  </div>
</div>
