<div class="forms-page">

  <!-- Section 1: Admission Form Templates -->
  <div class="page-header">
    <div>
      <h2 class="page-title">Forms & Documents</h2>
      <p class="page-subtitle">Open admission templates or manage stored documents</p>
    </div>
  </div>

  <div class="forms-templates-section">
    <h3 class="forms-section-label">Admission Form Templates</h3>
    <div class="forms-template-row">

      <button class="forms-template-card" id="btn-open-diploma">
        <div class="ftc-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="32" height="32">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" />
          </svg>
        </div>
        <div class="ftc-body">
          <div class="ftc-title">Diploma Admission Form</div>
          <div class="ftc-sub">Opens template in Microsoft Word</div>
        </div>
        <div class="ftc-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
            <polyline points="15 3 21 3 21 9" />
            <line x1="10" y1="14" x2="21" y2="3" />
          </svg>
        </div>
      </button>

      <button class="forms-template-card" id="btn-open-nondiploma">
        <div class="ftc-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="32" height="32">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <rect x="8" y="12" width="8" height="6" />
          </svg>
        </div>
        <div class="ftc-body">
          <div class="ftc-title">Non-Diploma Admission Form</div>
          <div class="ftc-sub">Opens template in PDF Viewer</div>
        </div>
        <div class="ftc-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
            <polyline points="15 3 21 3 21 9" />
            <line x1="10" y1="14" x2="21" y2="3" />
          </svg>
        </div>
      </button>

    </div>
  </div>

  <!-- Section 2: Document Storage -->
  <div style="margin-top: 20px;">
    <h3 class="forms-section-label" style="margin: 0 0 12px 0;">Documents Overview</h3>
    
    <div class="toolbar" style="margin-bottom: 16px;">
      <div class="search-wrapper" style="max-width: 380px;">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="docs-search-input" class="search-input" placeholder="Search stored documents...">
      </div>
      
      <div style="margin-left: auto;">
          <button class="btn btn-premium premium-entrance" id="btn-add-document">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14" style="margin-right: 6px;">
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            Add File
          </button>
      </div>
    </div>

    <div class="table-card forms-docs-section" style="border-radius: 12px; overflow: hidden; border: 1px solid var(--border); box-shadow: var(--shadow-sm); background: var(--bg-card);">
      <div id="documents-list">
      <div class="docs-empty" id="docs-empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="40" height="40"
          style="opacity:0.3; margin-bottom: 12px;">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
        </svg>
        <p>No documents yet. Click <strong>Add File</strong> to store one here.</p>
      </div>
      <div id="docs-file-list"></div>
      
      <div class="table-footer" id="docs-pagination" style="display: none;">
        <span class="table-count" id="docs-page-info">Page 1 of 1</span>
        <div class="pagination">
          <button class="pg-btn pg-prev" id="btn-docs-prev">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
          </button>
          <button class="pg-btn pg-next" id="btn-docs-next">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

</div>
