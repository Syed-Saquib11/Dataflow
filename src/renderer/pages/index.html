  <!-- ═══ SPLASH SCREEN ═══ -->
  <div id="splash-screen">
    <style>
      #splash-screen {
        position: fixed; inset: 0; z-index: 99999;
        background: linear-gradient(135deg, #0f0e1a 0%, #1a1340 30%, #1e1465 60%, #0f0e1a 100%);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        transition: opacity .4s cubic-bezier(.4,0,.2,1), transform .4s cubic-bezier(.4,0,.2,1);
        overflow: hidden;
        font-family: 'Segoe UI', 'Inter', sans-serif;
      }
      #splash-screen.fade-out {
        opacity: 0; transform: scale(1.04);
        pointer-events: none;
      }

      /* Animated background grid */
      .splash-grid {
        position: absolute; inset: 0; overflow: hidden; opacity: .08;
        background-image:
          linear-gradient(rgba(99,102,241,.3) 1px, transparent 1px),
          linear-gradient(90deg, rgba(99,102,241,.3) 1px, transparent 1px);
        background-size: 60px 60px;
        animation: splash-grid-drift 20s linear infinite;
      }
      @keyframes splash-grid-drift {
        0% { transform: translate(0,0); }
        100% { transform: translate(60px,60px); }
      }

      /* Floating particles */
      .splash-particles {
        position: absolute; inset: 0; overflow: hidden; pointer-events: none;
      }
      .splash-particle {
        position: absolute; border-radius: 50%;
        background: radial-gradient(circle, rgba(139,92,246,.6) 0%, transparent 70%);
        animation: splash-float linear infinite;
        opacity: 0;
      }
      @keyframes splash-float {
        0%   { transform: translateY(100vh) scale(0); opacity: 0; }
        10%  { opacity: 1; }
        90%  { opacity: 1; }
        100% { transform: translateY(-10vh) scale(1); opacity: 0; }
      }

      /* Glow ring behind logo */
      .splash-glow-ring {
        position: absolute; width: 240px; height: 240px; border-radius: 50%;
        background: radial-gradient(circle, rgba(99,102,241,.25) 0%, rgba(139,92,246,.1) 40%, transparent 70%);
        animation: splash-glow-pulse 2.5s ease-in-out infinite;
      }
      @keyframes splash-glow-pulse {
        0%, 100% { transform: scale(.9); opacity: .6; }
        50%      { transform: scale(1.2); opacity: 1; }
      }

      /* Logo container */
      .splash-logo-wrap {
        position: relative; z-index: 2;
        display: flex; flex-direction: column; align-items: center; gap: 0;
      }

      /* Logo icon */
      .splash-logo-icon {
        width: 88px; height: 88px; border-radius: 24px;
        background: linear-gradient(145deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
        display: flex; align-items: center; justify-content: center;
        box-shadow:
          0 0 60px rgba(99,102,241,.5),
          0 0 120px rgba(139,92,246,.3),
          0 20px 60px rgba(0,0,0,.4),
          inset 0 1px 1px rgba(255,255,255,.2);
        animation: splash-logo-float 3s ease-in-out infinite, splash-logo-enter .8s cubic-bezier(.22,1,.36,1) both;
      }
      @keyframes splash-logo-float {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-8px); }
      }
      @keyframes splash-logo-enter {
        from { opacity: 0; transform: translateY(30px) scale(.7); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }
      .splash-logo-icon svg {
        width: 44px; height: 44px;
        filter: drop-shadow(0 2px 8px rgba(0,0,0,.3));
      }

      /* Title */
      .splash-title {
        margin-top: 28px; font-size: 38px; font-weight: 800;
        letter-spacing: .15em; text-transform: uppercase;
        background: linear-gradient(135deg, #c4b5fd 0%, #fff 40%, #a78bfa 80%, #818cf8 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: splash-title-enter .8s cubic-bezier(.22,1,.36,1) .2s both;
        text-shadow: none;
      }
      @keyframes splash-title-enter {
        from { opacity: 0; transform: translateY(20px); letter-spacing: .4em; }
        to   { opacity: 1; transform: translateY(0); letter-spacing: .15em; }
      }

      /* Tagline */
      .splash-tagline {
        margin-top: 8px; font-size: 14px; font-weight: 400;
        color: rgba(196,181,253,.6); letter-spacing: .08em;
        animation: splash-tag-enter .6s ease .5s both;
      }
      @keyframes splash-tag-enter {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* Progress bar */
      .splash-progress-wrap {
        position: relative; z-index: 2;
        margin-top: 48px; width: 220px; height: 3px;
        background: rgba(255,255,255,.08); border-radius: 4px; overflow: hidden;
        animation: splash-bar-enter .5s ease .6s both;
      }
      @keyframes splash-bar-enter {
        from { opacity: 0; width: 100px; }
        to   { opacity: 1; width: 220px; }
      }
      .splash-progress-fill {
        height: 100%; border-radius: 4px; width: 0%;
        background: linear-gradient(90deg, #6366f1, #a78bfa, #c4b5fd);
        box-shadow: 0 0 12px rgba(139,92,246,.6);
        animation: splash-progress 2.4s cubic-bezier(.4,0,.2,1) .7s forwards;
      }
      @keyframes splash-progress {
        0%   { width: 0%; }
        30%  { width: 40%; }
        60%  { width: 70%; }
        85%  { width: 90%; }
        100% { width: 100%; }
      }

      /* Loading dots */
      .splash-dots {
        margin-top: 18px; display: flex; gap: 6px; z-index: 2;
        animation: splash-dots-enter .4s ease .8s both;
      }
      @keyframes splash-dots-enter { from { opacity: 0; } to { opacity: 1; } }
      .splash-dot {
        width: 6px; height: 6px; border-radius: 50%; background: #8b5cf6;
        animation: splash-dot-bounce 1.2s ease-in-out infinite;
      }
      .splash-dot:nth-child(2) { animation-delay: .15s; }
      .splash-dot:nth-child(3) { animation-delay: .3s; }
      @keyframes splash-dot-bounce {
        0%, 80%, 100% { transform: scale(.6); opacity: .4; }
        40%           { transform: scale(1.2); opacity: 1; }
      }

      /* Version tag */
      .splash-version {
        position: absolute; bottom: 28px; z-index: 2;
        font-size: 11px; color: rgba(255,255,255,.15); letter-spacing: .1em;
      }
    </style>

    <div class="splash-grid"></div>

    <div class="splash-particles">
      <div class="splash-particle" style="width:4px;height:4px;left:10%;animation-duration:6s;animation-delay:0s;"></div>
      <div class="splash-particle" style="width:6px;height:6px;left:25%;animation-duration:8s;animation-delay:.5s;"></div>
      <div class="splash-particle" style="width:3px;height:3px;left:40%;animation-duration:5s;animation-delay:1s;"></div>
      <div class="splash-particle" style="width:5px;height:5px;left:55%;animation-duration:7s;animation-delay:.3s;"></div>
      <div class="splash-particle" style="width:4px;height:4px;left:70%;animation-duration:6.5s;animation-delay:.8s;"></div>
      <div class="splash-particle" style="width:7px;height:7px;left:85%;animation-duration:9s;animation-delay:.2s;"></div>
      <div class="splash-particle" style="width:3px;height:3px;left:15%;animation-duration:5.5s;animation-delay:1.2s;"></div>
      <div class="splash-particle" style="width:5px;height:5px;left:60%;animation-duration:7.5s;animation-delay:.6s;"></div>
      <div class="splash-particle" style="width:4px;height:4px;left:92%;animation-duration:6s;animation-delay:1.5s;"></div>
    </div>

    <div class="splash-glow-ring"></div>

    <div class="splash-logo-wrap">
      <div class="splash-logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 10v6M2 10l10-5 10 5-10 5z" />
          <path d="M6 12v4c0 1.7 2.2 3 6 3s6-1.3 6-3v-4" />
        </svg>
      </div>
      <div class="splash-title">DATAFLOW</div>
      <div class="splash-tagline">Student Management System</div>
    </div>

    <div class="splash-progress-wrap">
      <div class="splash-progress-fill"></div>
    </div>

    <div class="splash-dots">
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
    </div>

    <div class="splash-version">v1.0.0</div>
  </div>

  <script>
    window.splashScreenActive = true;
    // Auto-dismiss splash after progress completes (~3.1s)
    setTimeout(() => {
      const splash = document.getElementById('splash-screen');
      if (splash) {
        splash.classList.add('fade-out');
        setTimeout(() => {
          splash.remove();
          window.splashScreenActive = false;
          // Trigger a global event to let dashboard know it can start
          window.dispatchEvent(new CustomEvent('splashScreenDone'));
        }, 400); 
      }
    }, 3100);
  </script>
